env:
  GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

name: "C# and .NET Checks"
on:
  pull_request:
    types: [labeled, opened, synchronize, reopened, auto_merge_enabled]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  run-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.GIT_SHA }}
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Run Tests with Coverage
        run: |
          dotnet test \
            --no-restore \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./TestResults
        working-directory: ./Aptos.Tests
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@13ce06bfc6bbe3ecf90edbbf1bc32fe5978ca1d3 # v5.3.1
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./Aptos.Tests/TestResults/**/coverage.cobertura.xml
          flags: unittests
          name: aptos-dotnet-sdk
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: coverage-report
          path: ./Aptos.Tests/TestResults/**/coverage.cobertura.xml
          retention-days: 30

  run-format-check:
    name: Check Formatting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.GIT_SHA }}
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          build: false

      - name: Check Formatting
        uses: ./.github/actions/check-formatting
