env:
  GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

name: "C# and .NET Checks"
on:
  pull_request:
    types: [labeled, opened, synchronize, reopened, auto_merge_enabled]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  run-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.GIT_SHA }}
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Run Tests with Coverage
        run: |
          dotnet test \
            --no-restore \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./TestResults
        working-directory: ./Aptos.Tests
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./Aptos.Tests/TestResults/**/coverage.cobertura.xml
          flags: unittests
          name: aptos-dotnet-sdk
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: ./Aptos.Tests/TestResults/**/coverage.cobertura.xml
          retention-days: 30

  run-format-check:
    name: Check Formatting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.GIT_SHA }}
          persist-credentials: false

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
        with:
          build: false

      - name: Check Formatting
        uses: ./.github/actions/check-formatting
